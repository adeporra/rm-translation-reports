name: Daily Translation Report

on:
  schedule:
    # 04:00 UTC = 05:00 CET (Madrid winter) / 06:00 CEST (Madrid summer)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days back to fetch log (1 = yesterday)'
        required: false
        default: '1'

env:
  PROGRAM_ID: '47754'
  ENVIRONMENT_ID: '237306'
  IMS_ORG_ID: '114744A66135CF9B0A495FEB@AdobeOrg'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      target_date: ${{ steps.date.outputs.target_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Archive and reset on Sunday
        run: |
          if [ "$(date +%u)" = "7" ]; then
            ARCHIVE_DIR="reports/archive/weekly_$(date +%Y-%m-%d)"
            mkdir -p "$ARCHIVE_DIR"
            [ -f reports/translation_jobs_all_days.csv ] && cp reports/translation_jobs_all_days.csv "$ARCHIVE_DIR/"
            [ -f reports/translation_jobs_all_days.html ] && cp reports/translation_jobs_all_days.html "$ARCHIVE_DIR/"
            [ -f reports/translation_jobs_all_days.xlsx ] && cp reports/translation_jobs_all_days.xlsx "$ARCHIVE_DIR/"
            [ -f reports/metadata.json ] && cp reports/metadata.json "$ARCHIVE_DIR/"
            [ -f reports/SUMMARY.md ] && cp reports/SUMMARY.md "$ARCHIVE_DIR/"
            rm -f reports/translation_jobs_all_days.csv reports/metadata.json
            echo "Archived to $ARCHIVE_DIR and reset for new week"
          fi

      - name: Determine target date
        id: date
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back || '1' }}"
          TARGET_DATE=$(date -d "-${DAYS_BACK} days" '+%Y-%m-%d' 2>/dev/null || date -v-${DAYS_BACK}d '+%Y-%m-%d')
          echo "target_date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"
          echo "Target date: ${TARGET_DATE}"

      - name: Get IMS access token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST 'https://ims-na1.adobelogin.com/ims/token/v3' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -d "client_id=${{ secrets.ADOBE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ADOBE_CLIENT_SECRET }}" \
            -d 'grant_type=client_credentials' \
            -d 'scope=openid,AdobeID,read_organizations,additional_info.projectedProductContext,read_pc.dma_aem_ams')

          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "" ]; then
            echo "Failed to obtain IMS token"
            echo "$RESPONSE" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "IMS token obtained successfully"

      - name: Fetch log download URL from Cloud Manager
        id: logs
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back || '1' }}"

          RESPONSE=$(curl -s -X GET \
            "https://cloudmanager.adobe.io/api/program/${{ env.PROGRAM_ID }}/environment/${{ env.ENVIRONMENT_ID }}/logs?service=author&name=aemerror&days=${DAYS_BACK}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "x-gw-ims-org-id: ${{ env.IMS_ORG_ID }}" \
            -H "x-api-key: ${{ secrets.ADOBE_CLIENT_ID }}" \
            -H "Content-Type: application/json")

          echo "$RESPONSE" | python3 -c "
          import sys, json
          BASE = 'https://cloudmanager.adobe.io'
          data = json.load(sys.stdin)
          if 'error_code' in data:
              err = data.get('error_code', '')
              msg = data.get('message', '')
              print(f'::error::Cloud Manager API failed: {err} - {msg}')
              if err == '403025':
                  print('::error::Fix: Add the credential technical account to a Cloud Manager product profile in Adobe Admin Console. See README.')
              print(json.dumps(data, indent=2))
              sys.exit(1)
          links = data.get('_embedded', {}).get('downloads', [])
          if not links:
              print('No log download links found')
              sys.exit(1)
          for link in links:
              print(f'Log: {link.get(\"date\",\"\")} - {link.get(\"service\",\"\")}')
          urls = []
          for link in links:
              href = link.get('_links', {}).get('http://ns.adobe.com/adobecloud/rel/logs/download', {}).get('href', '')
              if href:
                  if href.startswith('/'):
                      href = BASE + href
                  urls.append(href)
          with open('download_urls.txt', 'w') as f:
              f.write('\n'.join(urls))
          print(f'Found {len(urls)} log file(s) to download')
          "

      - name: Download and decompress log files
        run: |
          set -e
          TARGET_DATE="${{ steps.date.outputs.target_date }}"
          LOG_FILE="author_aemerror_${TARGET_DATE}.log"
          rm -f "$LOG_FILE"

          DOWNLOADED=0
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            echo "Downloading from Cloud Manager..."
            if curl -s -L "$URL" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              -H "x-gw-ims-org-id: ${{ env.IMS_ORG_ID }}" \
              -H "x-api-key: ${{ secrets.ADOBE_CLIENT_ID }}" \
              -o "log_part.gz"; then
              if file log_part.gz 2>/dev/null | grep -q gzip; then
                gunzip -c log_part.gz >> "$LOG_FILE"
              else
                cat log_part.gz >> "$LOG_FILE"
              fi
              DOWNLOADED=1
            else
              echo "::warning::Download failed for URL (exit $?)"
            fi
            rm -f log_part.gz
          done < download_urls.txt

          if [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
            echo "::error::Log file is empty or missing. Check download URLs."
            echo "First URL (snippet): $(head -1 download_urls.txt 2>/dev/null | cut -c1-80)..."
            exit 1
          fi

          FILE_SIZE=$(du -h "$LOG_FILE" | cut -f1)
          echo "Log file: $LOG_FILE ($FILE_SIZE)"

      - name: Run analysis
        run: |
          TARGET_DATE="${{ steps.date.outputs.target_date }}"
          LOG_FILE="author_aemerror_${TARGET_DATE}.log"

          python scripts/analyze_translation_log.py "$LOG_FILE" \
            --reports-dir reports \
            --date "$TARGET_DATE"

      - name: Commit and push reports
        run: |
          TARGET_DATE="${{ steps.date.outputs.target_date }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update translation report with ${TARGET_DATE} data"
            git push
            echo "Reports committed and pushed"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f author_aemerror_*.log download_urls.txt log_part.gz

  deploy:
    needs: analyze
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare for GitHub Pages
        run: |
          cp reports/translation_jobs_all_days.html reports/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports

      - name: Send report by email
        if: ${{ secrets.MAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: ${{ secrets.MAIL_SMTP_HOST }}
          server_port: ${{ secrets.MAIL_SMTP_PORT }}
          username: ${{ secrets.MAIL_SMTP_USER }}
          password: ${{ secrets.MAIL_SMTP_PASS }}
          subject: "Translation Report — PROD (${{ needs.analyze.outputs.target_date || 'latest' }})"
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.MAIL_TO }}
          html_body: file://reports/translation_jobs_all_days.html
          content_type: text/html
